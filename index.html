<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestCalc - Simulador de Dividendos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Invest<span>Calc</span></h1>
            <p>Simulador de Bolsa em Tempo Real</p>
        </header>

        <main class="calculator-card">
            <div class="input-group">
                <label for="ticker">Código da Ação (B3)</label>
                <div class="input-container">
                    <input type="text" id="ticker" placeholder="Ex: PETR4, VALE3">
                </div>
            </div>

            <div class="input-group">
                <label for="amount">Valor para Investir (R$)</label>
                <div class="input-container">
                    <input type="number" id="amount" placeholder="Ex: 1000.00">
                </div>
            </div>

            <div class="input-group">
                <label for="yield">Rendimento Mensal por Cota (R$)</label>
                <div class="input-container">
                    <input type="number" id="yield" placeholder="Ex: 0.50" step="0.01">
                </div>
            </div>

            <button id="btn-calculate">Simular Investimento</button>

            <div id="result-area" class="hidden">
                <div class="divider"></div>
                
                <div class="result-grid">
                    <div class="result-item full-width highlight">
                        <span>Renda Mensal Estimada</span>
                        <h2 id="res-income">R$ 0,00</h2>
                    </div>

                    <div class="result-item full-width">
                        <span>Preço Atual do Ativo</span>
                        <h2 id="res-price">R$ 0,00</h2>
                    </div>

                    <div class="result-item">
                        <span>Qtd. de Cotas</span>
                        <h2 id="res-shares">0</h2>
                    </div>
                    <div class="result-item">
                        <span>Troco (Saldo)</span>
                        <h2 id="res-change">R$ 0,00</h2>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>Dados reais via API Financeira</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
